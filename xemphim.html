<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chiếu phim</title>
<style>
    body, html {
        background-color: darkred;
        margin:0;
        padding: 0;
        height: 100%;
        overflow-x: hidden;

    }

    #progress-bar {
        position: absolute;
        bottom: 0;
        left: 41%;
        width: 18%;
        height: 1px;
        background-color: #ddd;
    }

    #progress {
        height: 100%;
        background-color: red;
        width: 0;
    }


    #page-container{
        background-color: black;
        position:absolute;
        top:0;
        width:900px;
        left: 20%;
        height: 5000px;
        z-index: 1;

    }

    #video-container {
        background-color: black;
        position: absolute;
        top:12%;
        left: 20% ;
        width: 60%;
        height: 60%;
        z-index: 2;
    }
    #video:hover .control-button + .control-button:hover{
        display: block;
    }
    #video {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }
    #watched-time {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #fff;
        background-color: rgba(0, 0, 0, 0.5);
        padding: 5px 10px;
        border-radius: 5px;
    }

    .control-button {
        display: block;
        transition: all 400ms ease-in-out;
        z-index: 3;
        position: absolute;
        background-color: transparent; /* Màu nền của nút */
        color:black; /* Màu chữ của nút */
        border: none;
        padding: 10px;
        cursor: pointer;
        text-align: center;
        height: 40px;
        width: 40px;
        margin: 0;
        border-radius: 100%; /* Độ cong của góc */
        left: 15%;
        bottom:6%;
        
    }
</style>
</head>
<body>
<div id="page-container"></div>
<div id="video-container">
    <video id="video" controls>
        <source src="datasources/randomvideo/testvideo2.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
        <button class="control-button" id="seek-backward-button" aria-label="Tua ngược 10 giây"><img src="datasources/videocontroller/backward.png" style="height:20px;width:20px;"></img></button>
        <button class="control-button" id="seek-forward-button" aria-label="Tua nhanh 10 giây" style="left:18%"><img src="datasources/videocontroller/forward.png" style="height: 20px;width:20px;"></img></button>

</div>

<script>
    const video = document.getElementById('video');
    const progressBar = document.getElementById('progress');
    const progressContainer = document.getElementById('progress-bar');
    const seekBackwardButton = document.getElementById('seek-backward-button');
    const seekForwardButton = document.getElementById('seek-forward-button');




    seekBackwardButton.addEventListener('click', function() {
        video.currentTime -= 15; // tua lại 15 giây
    });



    seekForwardButton.addEventListener('click', function() {
        video.currentTime += 15; // tua tới phía trước 15 giây
    });

  /*  video.addEventListener('timeupdate', () => {
            const currentTime = video.currentTime;
            window.location.href = `index.html?time=${currentTime}`;
    }); */



  /*  video.addEventListener('timeupdate', () => {
        const progress = (video.currentTime / video.duration) * 100;
        progressBar.style.width = `${progress}%`;
    }) */


    
</script>
</body>
</html>
